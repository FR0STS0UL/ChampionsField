<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Champions Field</title>
<link rel="stylesheet" href="style.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#050810;overflow:hidden;font-family:'Barlow',sans-serif;color:#fff}
#gameWrap{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
#game{display:block;max-width:100vw;max-height:100vh;}

/* ── SCOREBOARD ── */
#scoreboard{position:absolute;top:0;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;pointer-events:none;user-select:none;z-index:20;font-family:'Barlow Condensed',sans-serif;}
#sb-top{background:rgba(6,8,18,0.96);border:1px solid rgba(255,255,255,0.1);border-top:none;padding:4px 28px;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.55);white-space:nowrap;border-bottom:1px solid rgba(255,255,255,0.06);}
#sb-series-title{color:#fff;}
#sb-main{display:flex;align-items:stretch;background:rgba(6,8,18,0.96);border:1px solid rgba(255,255,255,0.1);border-top:none;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,0.7);}
.sb-team-block{display:flex;align-items:center;}
.sb-bar{width:8px;height:100%;flex-shrink:0;}
.sb-team-block.left .sb-bar{order:-1;}
.sb-team-block.right .sb-bar{order:99;}
.sb-team-name{font-size:22px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:#fff;padding:7px 16px 7px 12px;}
.sb-team-block.right .sb-team-name{padding:7px 12px 7px 16px;}
.sb-score{font-size:40px;font-weight:900;color:#fff;padding:4px 10px;min-width:46px;text-align:center;background:rgba(255,255,255,0.05);border-left:1px solid rgba(255,255,255,0.08);border-right:1px solid rgba(255,255,255,0.08);line-height:1;display:flex;align-items:center;justify-content:center;}
#sb-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 20px;border-left:1px solid rgba(255,255,255,0.08);border-right:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);min-width:96px;}
#hud-timer{font-size:28px;font-weight:800;letter-spacing:2px;line-height:1;transition:color .3s,font-size .2s;}
#sb-bottom{background:rgba(4,6,14,0.96);border:1px solid rgba(255,255,255,0.08);border-top:none;padding:3px 20px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.35);display:flex;gap:8px;align-items:center;justify-content:center;white-space:nowrap;}
#sb-game-num,#sb-best-of{color:rgba(255,255,255,0.45);}
.sb-pip{color:rgba(255,255,255,0.15);}

/* ── PANELS ── */
#blueTeam,#orangeTeam{position:absolute;top:100px;width:210px;display:flex;flex-direction:column;gap:5px;pointer-events:none;z-index:10;}
#blueTeam{left:6px;}#orangeTeam{right:6px;}

/* ── BOOST ── */
#boost-wrap{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none;z-index:10;}
#boost-circle-container{position:relative;width:72px;height:72px;}
#boost-canvas{position:absolute;inset:0;width:72px;height:72px;}
#boost-circle-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:#fff;}
#boost-label{font-size:9px;letter-spacing:3px;opacity:.3;text-transform:uppercase;font-family:'Barlow',sans-serif;}

/* ── KICKOFF / GOAL / GAMEOVER ── */
#kickoff-countdown{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Barlow Condensed',sans-serif;font-size:120px;font-weight:900;color:#fff;text-shadow:0 0 40px rgba(255,255,255,0.4);pointer-events:none;display:none;z-index:30;animation:pulseCount .9s ease-in-out infinite;}
@keyframes pulseCount{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.08);}}
#goalBanner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s;z-index:25;}
#goalBanner.show{opacity:1;}
#goalWord{font-family:'Barlow Condensed',sans-serif;font-size:100px;font-weight:900;letter-spacing:14px;text-transform:uppercase;-webkit-text-stroke:2px rgba(255,255,255,0.15);}
#goalSub{font-size:16px;letter-spacing:6px;opacity:.6;margin-top:8px;font-weight:600;text-transform:uppercase;}
#ctrlHint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:1.5px;opacity:.2;white-space:nowrap;text-transform:uppercase;margin-bottom:90px;color:#fff;z-index:5;}
#ctrlHint span{color:#aaffaa;opacity:1;}

/* ── CONNECTING SCREEN ── */
#connecting{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#050810;z-index:50;gap:16px;}
#connecting h2{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:#00aaff;}
#connecting p{font-size:13px;opacity:.5;letter-spacing:1px;}
.spinner{width:40px;height:40px;border:3px solid rgba(0,170,255,0.2);border-top-color:#00aaff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PLAYER CARDS ── */
.playerCard{display:flex;align-items:center;background:rgba(0,0,0,0.72);border-radius:4px;overflow:hidden;height:42px;width:200px;border:1px solid rgba(255,255,255,0.07);}
.avatar-container{width:42px;height:42px;flex-shrink:0;background:#000;}
.pfp{width:100%;height:100%;object-fit:cover;border-right:1px solid rgba(255,255,255,0.08);}
.info-container{flex-grow:1;height:100%;display:flex;flex-direction:column;justify-content:center;padding-left:9px;position:relative;background-size:cover!important;background-position:center!important;}
.info-container::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.88) 0%,rgba(0,0,0,.25) 65%,transparent 100%);z-index:1;}
.name{position:relative;z-index:2;font-weight:800;font-size:12px;color:#fff;text-transform:uppercase;}
.playerTitle{position:relative;z-index:2;font-size:8px;font-weight:700;text-transform:uppercase;margin-top:1px;letter-spacing:1px;}
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game" width="1600" height="820"></canvas>

  <!-- Connecting screen (hidden once P2P is ready) -->
  <div id="connecting">
    <div class="spinner"></div>
    <h2 id="connecting-title">CONECTANDO</h2>
    <p id="connecting-msg">Uniéndose al servidor...</p>
  </div>

  <!-- RLCS Scoreboard -->
  <div id="scoreboard" style="display:none">
    <div id="sb-top"><span id="sb-series-title">FRIENDLY MATCH</span></div>
    <div id="sb-main">
      <div class="sb-team-block left">
        <div class="sb-bar" id="sb-blue-block" style="background:#00aaff"></div>
        <div class="sb-team-name" id="sb-blue-name">BLUE</div>
      </div>
      <div class="sb-score" id="sb-blue-score">0</div>
      <div id="sb-center"><div id="hud-timer">5:00</div></div>
      <div class="sb-score" id="sb-orange-score">0</div>
      <div class="sb-team-block right">
        <div class="sb-team-name" id="sb-orange-name">ORANGE</div>
        <div class="sb-bar" id="sb-orange-block" style="background:#ff6600"></div>
      </div>
    </div>
    <div id="sb-bottom">
      <span id="sb-game-num">GAME 1</span><span class="sb-pip">|</span><span id="sb-best-of">BEST OF 7</span>
    </div>
  </div>

  <div id="blueTeam"></div>
  <div id="orangeTeam"></div>

  <div id="boost-wrap" style="display:none">
    <div id="boost-circle-container">
      <canvas id="boost-canvas" width="72" height="72"></canvas>
      <div id="boost-circle-val">33</div>
    </div>
    <div id="boost-label">Boost</div>
  </div>

  <div id="kickoff-countdown">3</div>

  <div id="goalBanner">
    <div id="goalWord">¡GOL!</div>
    <div id="goalSub">INCREÍBLE</div>
  </div>

  <div id="ctrlHint">
    <span>WASD</span> mover · <span>Shift</span> boost · <span>Espacio</span> dash
  </div>
</div>


<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  CHAMPIONS FIELD — Game Bootstrap (socket.io, no WebRTC)
// ═══════════════════════════════════════════════════════════════
(function(){
    const params    = new URLSearchParams(window.location.search)
    const roomCode  = params.get("room")
    const freePlay  = params.get("free") === "1"
    const pd        = JSON.parse(localStorage.getItem("playerData")||"{}")

    function showMsg(m){ document.getElementById("connecting-msg").textContent=m }
    function hideOverlay(){
        document.getElementById("connecting").style.display="none"
        document.getElementById("scoreboard").style.display="flex"
        document.getElementById("boost-wrap").style.display="flex"
    }

    // ══ FREE PLAY — 100% local, zero network ════════════════════
    if(freePlay){
        myId = "local_player"
        isHost = true
        // Inline physics for free play (same constants as server)
        const FP = {
            players:[{
                id:"local_player", team:pd.team||"blue",
                name:pd.name||"Jugador", title:pd.title||"",
                titleColor:pd.titleColor||"#aaa",
                pfp:pd.pfp||"assets/default_pfp.png",
                banner:pd.banner||"assets/banners/Default.png",
                decal:pd.decal||null, boostTrail:pd.boostTrail||null,
                x:W/2, y:H/2, vx:0, vy:0, boost:33,
                dashing:false, dashTimer:0, dashCd:0, dashVx:0, dashVy:0
            }],
            ball:{x:W/2, y:H/2+100, vx:0, vy:0, spin:0},
            pads:PADS_POS.map(p=>({...p,active:true,timer:0})),
            scores:{blue:0,orange:0}, matchTime:Infinity,
            phase:"playing", kickoffTimer:0,
            settings:{blueTeamName:"FREE PLAY",orangeTeamName:"",
                      blueColor:"#ffffff",orangeColor:"#ffffff",
                      seriesTitle:"FREE PLAY",gameNum:1,bestOf:1}
        }

        // Init renderer
        settings = FP.settings
        ensurePlayer("local_player", FP.players[0])
        local.x=W/2; local.y=H/2; local.ready=true
        hideOverlay()

        // Local physics loop — runs in requestAnimationFrame already from game.js
        // We just need to tick the ball and feed it into the renderer
        const FP_DT=1/60
        let fpLast=0
        function fpTick(ts){
            const dt=Math.min((ts-fpLast)/1000,0.05); fpLast=ts
            // Ball physics
            const b=FP.ball
            b.vx*=Math.pow(0.9985,dt*60); b.vy*=Math.pow(0.9985,dt*60)
            b.x+=b.vx*dt; b.y+=b.vy*dt
            if(b.x-BALL_R<WALL_L){b.x=WALL_L+BALL_R;b.vx=Math.abs(b.vx)*0.72}
            if(b.x+BALL_R>WALL_R){b.x=WALL_R-BALL_R;b.vx=-Math.abs(b.vx)*0.72}
            if(b.y-BALL_R<WALL_T){b.y=WALL_T+BALL_R;b.vy=Math.abs(b.vy)*0.72}
            if(b.y+BALL_R>WALL_B){b.y=WALL_B-BALL_R;b.vy=-Math.abs(b.vy)*0.72}
            // Ball-player collision
            const p=FP.players[0]
            p.x=local.x; p.y=local.y; p.vx=local.vx; p.vy=local.vy
            const dx=b.x-p.x,dy=b.y-p.y,dist=Math.hypot(dx,dy),minD=BALL_R+CAR_R
            if(dist<minD&&dist>0.01){
                const nx=dx/dist,ny=dy/dist
                b.x+=nx*(minD-dist); b.y+=ny*(minD-dist)*0.5
                const rvx=b.vx-p.vx,rvy=b.vy-p.vy,relV=rvx*nx+rvy*ny
                if(relV<0){
                    const cspd=Math.hypot(p.vx,p.vy)
                    const imp=Math.max(200,-(1.5)*relV+cspd*0.85)
                    b.vx+=nx*imp; b.vy+=ny*imp
                }
            }
            // Pads
            FP.pads.forEach(pad=>{
                if(pad.active&&Math.hypot(p.x-pad.x,p.y-pad.y)<40){
                    local.boost=Math.min(100,local.boost+pad.value)
                    pad.active=false; pad.timer=pad.type==="big"?600:240
                }
                if(!pad.active){pad.timer-=dt*60; if(pad.timer<=0)pad.active=true}
            })
            // Push to renderer
            ball={x:Math.round(b.x),y:Math.round(b.y),spin:+b.spin.toFixed(2)}
            FP.pads.forEach((fp,i)=>boostPads[i]&&(boostPads[i].active=fp.active))
            gamePhase="playing"; matchTime=Infinity
            // Boost HUD
            const me=playerMap[myId]
            if(me){
                const bv=Math.round(local.boost)
                const el=document.getElementById("boost-circle-val")
                if(el)el.textContent=bv
                drawBoostCircle(bv,"#ffffff")
            }
            requestAnimationFrame(fpTick)
        }
        requestAnimationFrame(fpTick)
        return
    }

    // ══ MULTIPLAYER via socket.io ════════════════════════════════
    if(!roomCode){ showMsg("Sin sala. Vuelve al menú."); return }

    const socket = io()

    socket.on("connect", ()=>{
        myId = socket.id
        socket.emit("joinLobby",{room:roomCode,...pd})
        showMsg("Uniéndose a la sala...")
    })

    // Lobby
    socket.on("lobbyJoined", ({myId:id, players, settings:s, phase})=>{
        myId = id
        players.forEach(p=>{ const lp=ensurePlayer(p.id,p); Object.assign(lp,p) })
        if(s) settings=s
        updateSidePanels(players)
        // Hide overlay always — if phase=lobby we wait for gameStarted,
        // if phase=playing/kickoff we're already in game
        hideOverlay()
        if(phase==="lobby"){
            // Re-show scoreboard but display a "waiting" message briefly
            // Actually just show the game canvas ready to play
        }
    })

    socket.on("lobbyUpdate", ({players, settings:s})=>{
        players.forEach(p=>{ const lp=ensurePlayer(p.id,p); Object.assign(lp,p) })
        if(s) settings=s
        updateSidePanels(players)
    })

    socket.on("gameStarted", ({players, settings:s})=>{
        players.forEach(p=>{ const lp=ensurePlayer(p.id,p); Object.assign(lp,p) })
        if(s) settings=s
        updateSidePanels(players)
        hideOverlay()
    })

    // State — main game loop data
    socket.on("state", data=>{
        const srv=data.players.find(p=>p.id===myId)
        if(srv) reconcile(srv)

        data.players.forEach(sp=>{
            const p=ensurePlayer(sp.id,{team:sp.team})
            p.x=sp.x; p.y=sp.y; p.vx=sp.vx||0; p.vy=sp.vy||0
            p.boost=sp.boost; p.dashing=sp.dashing
            p.isBoosting=sp.isBoosting; p.dashCd=sp.dashCd||0
        })
        const live=new Set(data.players.map(p=>p.id))
        Object.keys(playerMap).forEach(id=>{if(!live.has(id))delete playerMap[id]})

        ball=data.ball; scores=data.scores; matchTime=data.matchTime
        gamePhase=data.phase||"playing"; kickoffTimer=data.kickoffTimer||0
        if(data.settings) settings=data.settings
        if(data.pads) data.pads.forEach((sp,i)=>boostPads[i]&&(boostPads[i].active=sp.active))
        updateHUD()
    })

    socket.on("goal",({scorer,scores:sc,settings:s})=>{
        if(s) settings=s; scores=sc; local.ready=false; dimAlpha=1
        showGoalBanner(scorer); spawnGoalExplosion(scorer); updateHUD()
        document.getElementById("goalBanner").classList.add("show")
    })
    socket.on("kickoff",({scores:sc,settings:s})=>{
        if(s) settings=s; scores=sc; dimAlpha=0
        document.getElementById("goalBanner").classList.remove("show"); updateHUD()
    })
    socket.on("gameOver", sc=>{ scores=sc; showGameOver(sc) })
    socket.on("disconnect", ()=>{
        document.getElementById("goalWord").textContent="DESCONECTADO"
        document.getElementById("goalWord").style.color="#ff4444"
        document.getElementById("goalSub").textContent="Reconectando..."
        document.getElementById("goalBanner").classList.add("show")
    })

    // Input — send every frame via setInterval (not rAF, more consistent)
    let seq=0
    const inputBuf=[]
    setInterval(()=>{
        const inp=getInput(); seq++
        inputBuf.push({seq,inp,dt:1/60})
        if(inputBuf.length>120) inputBuf.shift()
        socket.emit("input",{seq,input:inp})
    },1000/60)

    // Override clientGetInputBuf so reconcile() uses our buffer
    window._inputBuf = inputBuf
})()
</script>
</body>
</html>
