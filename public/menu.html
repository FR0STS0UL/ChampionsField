<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Rocket Hax - Menu</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.menu{
background:#1c1c1c;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
margin-top:0;
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
border:none;
border-radius:5px;
font-size:14px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:14px;
}

#redBtn{
background:#ff3b3b;
color:white;
}

#blueBtn{
background:#2da7ff;
color:white;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="menu">

<h1>Rocket Hax</h1>

<input id="nameInput" placeholder="Nombre">
<input id="titleInput" placeholder="Título">

<div>
<button id="redBtn" onclick="selectTeam('red')">Rojo</button>
<button id="blueBtn" onclick="selectTeam('blue')">Azul</button>
</div>

<br>

<button onclick="createRoom()">Crear sala</button>

<br><br>

<input id="roomInput" placeholder="Código sala">

<button onclick="joinRoom()">Unirse</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="menu.js"></script>

</body>
</html>
